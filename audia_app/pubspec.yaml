name: audia
description: Audia app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  go_router: ^14.8.1
  google_sign_in: ^6.2.2
  http: ^1.2.2
  provider: ^6.1.2
  image_picker: ^1.1.2
  image_cropper: 12.2.1
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  record: ^6.2.1
  file_picker: ^8.0.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/Logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
